<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro&display=swap" rel="stylesheet">
    <title>Creando Formularios</title>
</head>
<body>
    <header>
        <h1>Formulario de Inscripción UTN</h1>
    </header>
  
    <form action="">
        <label for="">Nombre Completo</label>
        <input type="text" id="nombre" class="boton2"S name="nombrecompleto"  placeholder="Nombre Completo">
         <br>
         <br>

        <label for="email">Escriba su Email</label>
        <br>
        <input type="email" class="boton2" placeholder="unemail@ejemplo.com">
        <br>
        <br>
    <label for="turno">Elija se Turno</label>
    <br>
    <br>
        <label for="turno">Turno Mañana</label>
        <input type="radio" id="turnoM" name="turno" value="mañana"></label>
        <br>
        <label for="turno">Turno Tarde</label>
        <input type="radio" id="turnoT" name="turno" value="tarde"></label>
        <br>
        <label for="turno">Turno Noche</label>
        <input type="radio" id="turnoN" name="turno" value="noche"></label>
        <br>
        <br>
        <label for="diplomatura">Indique a que curso de anota</label>
        <br>
        <br>
        <label for="PWI">Programador web Inicial</label>
        <input type="checkbox" name="cursos" value="Prog.Web.Inicial">
        <br>
        
        <label for="PWA">Programador web Avanzado</label>
        <input type="checkbox" name="cursos" value="Prog.Web.Avanzado">
        <br>
        
        <label for="nivel">Elija el nivel de conociento</label>
        <select name="nivel" class="boton1" id="nivel">
            <option value="inicial">Inicial</option>
            <option value="intermedio">Intermedio</option>
            <option value="avanzado">Avanzado</option>
        </select>
        <br>
        <br>
             <input type="submit" class="boton" value="Enviar">
      
    
    
    
    
    
    </form>
    
</body>
</html>
